name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0). Required for manual runs.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch')
          {
              $v = '${{ inputs.version }}'
          }
          else
          {
              $v = '${{ github.ref_name }}' -replace '^v', ''
          }
          if ([string]::IsNullOrWhiteSpace($v)) { throw 'Could not resolve version' }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Release version: $v"

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Publish
        run: pwsh build/publish.ps1

      - name: Download previous releases (for delta packaging)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vpk download github `
            --repoUrl https://github.com/${{ github.repository }} `
            --token $env:GITHUB_TOKEN `
            --outputDir Releases
        continue-on-error: true

      - name: Pack
        run: |
          vpk pack `
            --packId StageFrame `
            --packVersion ${{ steps.ver.outputs.version }} `
            --packDir publish/Stage `
            --mainExe Stage.exe `
            --packTitle 'Stage' `
            --icon src/Stage/app.ico `
            --outputDir Releases

      - name: Upload to GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vpk upload github `
            --repoUrl https://github.com/${{ github.repository }} `
            --token $env:GITHUB_TOKEN `
            --tag v${{ steps.ver.outputs.version }} `
            --releaseName 'StageFrame ${{ steps.ver.outputs.version }}' `
            --publish `
            --outputDir Releases

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: stageframe-${{ steps.ver.outputs.version }}
          path: Releases/
          retention-days: 14
