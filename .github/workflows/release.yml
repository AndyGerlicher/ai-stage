name: release

# Triggers:
#   - push to main          → rolling release at version 0.1.${{ github.run_number }}
#   - push of a v* tag      → release at the tag's version
#   - manual workflow_dispatch with explicit version
#
# Every push to main becomes a published GitHub Release that installed
# ai-stage instances pick up automatically (Velopack background update).
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0). Required for manual runs.'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $event = '${{ github.event_name }}'
          $refType = '${{ github.ref_type }}'
          if ($event -eq 'workflow_dispatch')
          {
              $v = '${{ inputs.version }}'
          }
          elseif ($refType -eq 'tag')
          {
              $v = '${{ github.ref_name }}' -replace '^v', ''
          }
          else
          {
              # Push to main → rolling per-commit version. github.run_number is
              # monotonically increasing across runs of this workflow.
              $v = '0.1.${{ github.run_number }}'
          }
          if ([string]::IsNullOrWhiteSpace($v)) { throw 'Could not resolve version' }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Release version: $v"

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Publish
        run: pwsh build/publish.ps1

      - name: Download previous releases (for delta packaging)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vpk download github `
            --repoUrl https://github.com/${{ github.repository }} `
            --token $env:GITHUB_TOKEN `
            --outputDir Releases
        continue-on-error: true

      - name: Pack
        run: |
          vpk pack `
            --packId ai-stage `
            --packVersion ${{ steps.ver.outputs.version }} `
            --packDir publish/ai-stage `
            --mainExe ai-stage.exe `
            --packTitle 'ai-stage' `
            --icon src/ai-stage/app.ico `
            --outputDir Releases

      - name: Upload to GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vpk upload github `
            --repoUrl https://github.com/${{ github.repository }} `
            --token $env:GITHUB_TOKEN `
            --tag v${{ steps.ver.outputs.version }} `
            --releaseName 'ai-stage ${{ steps.ver.outputs.version }}' `
            --publish `
            --outputDir Releases

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-stage-${{ steps.ver.outputs.version }}
          path: Releases/
          retention-days: 14
