name: release

# Triggers:
#   - push to main          → public release; version derived from Nerdbank.GitVersioning (NBGV).
#   - push of a v* tag      → public release at that tag's NBGV-derived version.
#   - manual workflow_dispatch (from main)
#
# Versions come from version.json + git height via NBGV — no run_number,
# no manual version inputs. Bump the major/minor by editing version.json.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # NBGV needs full git history to compute version height.
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install nbgv
        run: dotnet tool install -g nbgv

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = (& nbgv get-version -v NuGetPackageVersion).Trim()
          if ([string]::IsNullOrWhiteSpace($v)) { throw 'Could not resolve version' }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Release version: $v"

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Publish
        run: pwsh build/publish.ps1

      - name: Download previous releases (for delta packaging)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vpk download github `
            --repoUrl https://github.com/${{ github.repository }} `
            --token $env:GITHUB_TOKEN `
            --outputDir Releases
        continue-on-error: true

      - name: Pack
        run: |
          vpk pack `
            --packId ai-stage `
            --packVersion ${{ steps.ver.outputs.version }} `
            --packDir publish/ai-stage `
            --mainExe ai-stage.exe `
            --packTitle 'ai-stage' `
            --icon src/ai-stage/app.ico `
            --outputDir Releases

      - name: Upload to GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vpk upload github `
            --repoUrl https://github.com/${{ github.repository }} `
            --token $env:GITHUB_TOKEN `
            --tag v${{ steps.ver.outputs.version }} `
            --releaseName 'ai-stage ${{ steps.ver.outputs.version }}' `
            --publish `
            --outputDir Releases

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-stage-${{ steps.ver.outputs.version }}
          path: Releases/
          retention-days: 14
