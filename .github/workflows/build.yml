name: build

on:
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ai-stage.slnx

      - name: Build
        run: dotnet build ai-stage.slnx -c Release --no-restore --nologo

      - name: Publish (smoke-test the bundle)
        run: pwsh build/publish.ps1
